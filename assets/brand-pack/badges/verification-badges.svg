<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-label="Benchmark verification badges">
  <defs>
    <style>.label{font:700 22px Inter,Arial,sans-serif;letter-spacing:3px}.small{font:500 14px Inter,Arial,sans-serif;fill:rgba(255,255,255,.7)}</style>
  </defs>
  <rect width="900" height="220" fill="#050505"/>
  <g transform="translate(40 44)">
    <rect width="240" height="104" rx="52" fill="#15132A" stroke="#65E7C8" stroke-opacity=".7"/>
    <circle cx="54" cy="52" r="26" fill="#65E7C8"/><path d="M42 52L51 61L68 42" fill="none" stroke="#050505" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="label" x="96" y="48" fill="#65E7C8">VERIFIED</text><text class="small" x="98" y="72">raw + metadata</text>
  </g>
  <g transform="translate(330 44)">
    <rect width="240" height="104" rx="52" fill="#15132A" stroke="#62D6FF" stroke-opacity=".7"/>
