    <circle cx="54" cy="52" r="26" fill="#8A70FF"/><text x="46" y="63" fill="#050505" font-family="Inter,Arial" font-size="34" font-weight="900">?</text>
    <text class="label" x="96" y="48" fill="#8A70FF">ESTIMATED</text><text class="small" x="98" y="72">needs proof</text>
  </g>
